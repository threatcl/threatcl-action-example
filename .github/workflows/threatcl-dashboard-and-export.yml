name: threatcl dashboard and export

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  threatcl-dashboard-and-export:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Prepare output dirs
        # The action image runs as a non-root user (uid ~100), but the
        # checkout creates the workspace as the runner user (uid 1001).
        # Make the output dirs world-writable so the container can write
        # (and overwrite) files in them.
        run: |
          mkdir -p dashboard custom-dashboard html-dashboard otm
          chmod -R 777 dashboard custom-dashboard html-dashboard otm
      - name: threatcl validate
        uses: threatcl/threatcl-action@v0.0.7
        with:
          command: 'validate'
          files: './hcl-files/*'
      - name: threatcl dashboard
        uses: threatcl/threatcl-action@v0.0.7
        with:
          command: 'dashboard'
          files: './hcl-files/*'
          outdir: './dashboard'
      - name: threatcl custom dashboard
        uses: threatcl/threatcl-action@v0.0.7
        with:
          command: 'dashboard'
          files: './hcl-files/*'
          outdir: './custom-dashboard'
          dashboard-template: './templates/dashboard-template.tpl'
          dashboard-filename: 'db'
          threatmodel-template: './templates/threatmodel-template.tpl'
      - name: threatcl custom html dashboard
        uses: threatcl/threatcl-action@v0.0.7
        with:
          command: 'dashboard'
          files: './hcl-files/*'
          outdir: './html-dashboard'
          dashboard-template: './templates/dashboard-template-html.tpl'
          dashboard-filename: 'index'
          threatmodel-template: './templates/threatmodel-template-html.tpl'
          dashboard-html: 'true'
      - name: threatcl export
        uses: threatcl/threatcl-action@v0.0.7
        with:
          command: 'export'
          files: './hcl-files/*'
          export-format: 'otm'
          export-output: './otm/otm.json'
      - name: Commit changes
        run: |
          git config --global user.name "threatcl Git Action"
          git config --global user.email "xntrik@users.noreply.github.com"
          git add ./dashboard/*
          git add ./html-dashboard/*
          git add ./custom-dashboard/*
          git add ./otm/*
          git commit -m "Automated updated dashboard and export"
          git push
