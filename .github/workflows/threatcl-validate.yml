name: threatcl validate

on: [push, pull_request]

jobs:
  threatcl-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: threatcl validate
        uses: threatcl/threatcl-action@v0.0.7
        with:
          command: 'validate'
          files: './hcl-files/*'
